<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
body { font-family: sans-serif; }
</style>
</head>

<body>

<div id="table"></div>

<script>
fetch("https://www.tiira.fi/index.php?toiminto=29&alue=3&limit=50")
  .then(r => r.text())
  .then(html => {
      const doc = new DOMParser().parseFromString(html, "text/html");
      const table = doc.querySelector(".havaintolistaus");
      document.getElementById("table").appendChild(table);
  });
</script>

</body>
</html>
